syntax = "proto3";

package auth;

option go_package = "spotify/proto/auth";

service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse) {}
  rpc CheckCSRF(CheckCSRFRequest) returns (CheckCSRFResponse) {}
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse) {}
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool is_valid = 1;
  string user_id = 2;
  string session_id = 3; 
}

message CheckCSRFRequest {
  string user_id = 1;
  string session_id = 2;
  string csrf_token = 3;
}

message CheckCSRFResponse {
  bool is_valid = 1;
}

message GetUsersRequest {
  repeated string user_ids = 1;
}

message UserInfo {
  string user_id = 1;
  string login = 2;
  string avatar_url = 3;
}

message GetUsersResponse {
  repeated UserInfo users = 1;
}