auth:
  http:
    port: "8080"
    readTimeout: 5s
    writeTimeout: 10s
    idleTimeout: 60s
    shutdownTimeout: 15s
    cors:
      allowedOrigins:
        - "http://localhost:8090"
        - "http://217.16.17.173:8090"
      allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
      allowedHeaders:
        ["Content-Type", "Authorization", "X-Requested-With", "X-CSRF-Token"]
      allowCredentials: true
    allowedAvatarTypes:
      - "image/png"
      - "image/jpeg"
      - "image/webp"
      - "image/jpg"
      - "image/gif"
      - "image/bmp"
      - "image/svg"
      - "image/avif"
      - "image/heic"
      - "image/heif"
      - "image/ico"
    auth:
      jwt:
        secretKey: "dev-jwt-secret"
        accessTokenTTL: 720h
      csrf:
        secretKey: "dev-csrf-secret"
        tokenTTL: 15m
  grpc:
    port: "9001"
  logger:
    level: "debug"
    mode: "dev"


catalog:
  http:
    port: "8081"
    readTimeout: 5s
    writeTimeout: 10s
    idleTimeout: 60s
    shutdownTimeout: 15s
    cors:
      allowedOrigins:
        - "http://localhost:8090"
        - "http://217.16.17.173:8090"
      allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
      allowedHeaders:
        ["Content-Type", "Authorization", "X-Requested-With", "X-CSRF-Token"]
      allowCredentials: true
  grpc:
    port: "9000"
    clients:
      auth: "auth:9001"
  logger:
    level: "debug"
    mode: "dev"

playlist:
  http:
    port: "8082"
    readTimeout: 5s
    writeTimeout: 10s
    idleTimeout: 60s
    shutdownTimeout: 15s
    cors:
      allowedOrigins:
        - "http://localhost:8090"
        - "http://217.16.17.173:8090"
      allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
      allowedHeaders: ["Content-Type", "Authorization", "X-Requested-With", "X-CSRF-Token"]
      allowCredentials: true
    auth:
      jwt:
        secretKey: "dev-jwt-secret"
        accessTokenTTL: 720h
      csrf:
        secretKey: "dev-csrf-secret"
        tokenTTL: 15m

  logger:
    level: "debug"
    mode: "dev"

  allowed_avatar_types:
    - "image/png"
    - "image/jpeg"
    - "image/webp"
    - "image/jpg"
    - "image/gif"
    - "image/bmp"
    - "image/svg"
    - "image/avif"
    - "image/heic"
    - "image/heif"
    - "image/ico"

  buckets:
    avatars: "avatars"

  clients:
    catalog: "catalog:9000"

db:
  auth:
    host: "db"
    port: 5432
    user: "auth_user"
    password: "auth_password"
    dbName: "mydb"
    sslmode: "disable"
    maxOpenConns: 20
    maxIdleConns: 20
    connMaxLifetime: 5m

  catalog:
    host: "db"
    port: 5432
    user: "catalog_user"
    password: "catalog_password"
    dbName: "mydb"
    sslmode: "disable"
    maxOpenConns: 30
    maxIdleConns: 30
    connMaxLifetime: 5m

  playlist:
    host: "db"
    port: 5432
    user: "playlist_user"
    password: "playlist_password"
    dbName: "mydb"
    sslmode: "disable"
    maxOpenConns: 15
    maxIdleConns: 15
    connMaxLifetime: 5m

minio:
  endpoint: "minio:9000"
  accessKey: "miniouser"
  secretKey: "miniopassword"
  bucket: "avatars"
  useSSL: false
