worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    upstream auth_backend {
        server auth:8080;
    }

    upstream catalog_backend {
        server catalog:8081;
    }

    upstream playlist_backend {
        server playlist:8082;
    }

    server {
        listen 80;
        server_name wave-music.ru;
        
        return 301 https://$host$request_uri;
    }

    server {

        listen 443 ssl http2;
        server_name wave-music.ru;

        ssl_certificate /etc/letsencrypt/live/wave-music.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wave-music.ru/privkey.pem;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;


        location /api/v1/playlists {
            proxy_pass http://playlist_backend;
        }

        location ~ ^/api/v1/tracks/[^/]+/comments/ws$ {
            proxy_pass http://catalog_backend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location ~ ^/api/v1/(tracks|albums|artists|genres) {
            proxy_pass http://catalog_backend;
        }

        location ~ ^/api/v1/(login|register|logout|profile|me|csrf-token) {
            proxy_pass http://auth_backend;
        }
        location /api/v1/avatar {
            proxy_pass http://auth_backend;
            client_max_body_size 10M;
        }

        location ^~ /avatars/ {
            proxy_pass http://minio:9000/avatars/;
            proxy_set_header Host minio:9000;
            expires 7d;
            add_header Cache-Control "public";
        }

        location ^~ /music/ {
            proxy_pass http://minio:9000/music/;
            proxy_set_header Host minio:9000;
        }

        root /var/www/frontend;
        index index.html;

        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff|woff2|eot|ttf|otf)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public";
        }

        location / {
            try_files $uri $uri/ /index.html;            
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}