worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    upstream auth_backend {
        server auth:8080;
    }

    upstream catalog_backend {
        server catalog:8081;
    }

    upstream playlist_backend {
        server playlist:8082;
    }

    server {
        listen 80;
        server_name _;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        location /api/v1/playlists {
            proxy_pass http://playlist_backend;
        }

        location ~ ^/api/v1/(tracks|albums|artists|genres) {
            proxy_pass http://catalog_backend;
        }

        location ~ ^/api/v1/(login|register|logout|profile|me|csrf-token) {
            proxy_pass http://auth_backend;
        }

        location /api/v1/avatar {
            proxy_pass http://auth_backend;
            client_max_body_size 10M;
        }

        location ^~ /avatars/ {
            proxy_pass http://minio:9000/avatars/;
            proxy_set_header Host minio:9000;
            expires 7d;
            add_header Cache-Control "public";
        }

        location ^~ /music/ {
            proxy_pass http://minio:9000/music/;
            proxy_set_header Host minio:9000;
        }

        root /var/www/frontend;
        index index.html;

        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff|woff2|eot|ttf|otf)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public";
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
