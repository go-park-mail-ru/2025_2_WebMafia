server:
  port: "8080"
  readTimeout: 5s
  writeTimeout: 10s
  idleTimeout: 60s
  shutdownTimeout: 15s

logger:
  level: "info"
  mode: "prod"

db:
  host: "db"
  port: 5432
  user: "myuser"
  password: ""
  dbName: "mydb"
  sslmode: "disable"
  maxOpenConns: 25
  maxIdleConns: 25
  connMaxLifetime: 5m

minio:
  endpoint: "minio:9000"
  accessKey: ""
  secretKey: ""
  bucket: "avatars"
  useSSL: false

auth:
  jwt:
    secretKey: ""
    accessTokenTTL: 720h
  csrf:
    secretKey: ""
    tokenTTL: 15m

cors:
  allowedOrigins: ["http://localhost:8090", "http://217.16.17.173:8090"]
  allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allowedHeaders:
    ["Content-Type", "Authorization", "X-Requested-With", "X-CSRF-Token"]
  allowCredentials: true

app:
  allowedAvatarTypes:
    [
      "image/png",
      "image/jpeg",
      "image/webp",
      "image/jpg",
      "image/gif",
      "image/bmp",
      "image/svg",
      "image/avif",
      "image/heic",
      "image/heif",
      "image/ico",
    ]
