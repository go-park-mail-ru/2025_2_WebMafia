global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "wave-auth"
    static_configs:
      - targets: ["auth:8080"]
        labels:
          service: "auth"

  - job_name: "wave-catalog"
    static_configs:
      - targets: ["catalog:8081"]
        labels:
          service: "catalog"

  - job_name: "wave-playlist"
    static_configs:
      - targets: [ "playlist:8082" ]
        labels:
          service: "playlist"

  - job_name: "postgres"
    static_configs:
      - targets: [ "postgres-exporter:9187" ]


