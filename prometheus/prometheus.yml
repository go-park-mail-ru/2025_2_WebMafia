global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "wave-auth"
    static_configs:
      - targets: ["auth:8080"]

  - job_name: "wave-catalog"
    static_configs:
      - targets: ["catalog:8081"]
